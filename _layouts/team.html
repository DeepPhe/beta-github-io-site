---
layout: default
---

<div class="container pb-6 pt-6 pt-md-10 pb-md-10">
  <div class="row justify-content-start">
    <div class="col-12 col-md-8">
      <div class="team team-single">
        <h1 class="title">{{page.title}}</h1>
        <p class="team-single-role">{{ page.jobtitle }}</p>
{% if page.institution %}
        <p class="team-single-institution">
{% if page.institutionurl %}
          <a href="{{ page.institutionurl }}">{{ page.institution }}</a>
{% else %}
          {{ page.institution }}
{% endif %}
        </p>
{% endif %}
        <div class="content">{{content}}</div>
{% if page.profileurl %}
        <p><a href="{{ page.profileurl }}">Official profile</a></p>
{% endif %}
      </div>
    </div>
  </div>
</div>
