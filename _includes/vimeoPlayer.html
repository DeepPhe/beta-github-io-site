{% assign video_id = include.youtube_id | default: include.id | default: "X-5XhunAg6M" %}
{% assign video_title = include.title | default: "DeepPhe video" %}
<div class="video-embed">
  <iframe src="https://www.youtube-nocookie.com/embed/{{ video_id }}" title="{{ video_title | escape }}" loading="lazy" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
</div>
